<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/orbit-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORBIT — Connect Offline. Live More.</title>
    <meta name="description" content="ORBIT brings people together in the real world. Discover local events, build genuine friendships, and create memories that matter. Join the waitlist today." />
    <meta property="og:title" content="ORBIT — Connect Offline. Live More." />
    <meta property="og:description" content="The app that brings people together in the real world. Join the waitlist." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      (function() {
        try {
          var t = localStorage.getItem('orbit-theme');
          if (t === 'light') return;
          if (!t) localStorage.setItem('orbit-theme', 'dark');
          document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
